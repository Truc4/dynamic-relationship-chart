<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Relationship Chart</title>

    <!-- Cytoscape.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.0/dist/cytoscape.min.js"></script>

    <!-- COSE-Bilkent Layout Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-cose-bilkent@4.1.0/dist/cytoscape-cose-bilkent.umd.js"></script>

    <script>
      // Register COSE-Bilkent layout after both scripts load
      if (typeof cytoscape !== 'undefined') {
        // Try multiple possible export names for the COSE-Bilkent plugin
        const coseBilkentModule = window.coseBilkent || window.CoseBilkent || window['cytoscape-cose-bilkent'];

        if (coseBilkentModule) {
          console.log('Registering COSE-Bilkent layout...');
          cytoscape.use(coseBilkentModule);
          console.log('✓ COSE-Bilkent registered');
        } else {
          console.warn('COSE-Bilkent library not available from CDN, using standard COSE layout');
        }
      } else {
        console.error('Cytoscape failed to load from CDN');
      }
    </script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Relationship Chart</h1>
            </div>

            <!-- Error Banner -->
            <div id="errorBanner" class="error-banner" style="display: none;"></div>

            <!-- Data Reload -->
            <div class="section">
                <h3>Load Data</h3>
                <label for="dataFileInput">Select JSON file:</label>
                <input type="file" id="dataFileInput" accept=".json" title="Load a relationships.json file">
                <button id="downloadJsonBtn">Download JSON</button>
            </div>

            <!-- Search -->
            <div class="section">
                <h3>Search</h3>
                <input type="text" id="searchInput" placeholder="Search by name...">
            </div>

            <!-- Group Filter -->
            <div class="section">
                <h3>Groups</h3>
                <div id="groupFilterContainer"></div>
            </div>

            <!-- Edit Relationships -->
            <div class="section">
                <h3>Relationships</h3>
                <p class="hint">Click 2 nodes to create a relationship<br>Click an edge to edit it</p>

                <!-- Node Selection -->
                <div id="nodeSelectionPanel" style="display: none;">
                    <h4>Selected Nodes</h4>
                    <div id="selectedNodesDisplay" style="margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px;"></div>
                    <div id="relTypeSelectionPanel" style="display: none; margin-top: 10px;">
                        <label>Relationship Type:</label>
                        <select id="newRelTypeSelect"></select>
                        <input type="text" id="newRelLabelInput" placeholder="Label (optional)">
                        <button id="createRelationshipBtn">Create</button>
                        <button id="cancelSelectionBtn">Cancel</button>
                    </div>
                </div>

                <!-- Edge Editing -->
                <div id="edgeEditPanel" style="display: none;">
                    <h4>Edit Edge</h4>
                    <div id="edgeInfoDisplay" style="margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px;"></div>
                    <label>Type:</label>
                    <select id="editEdgeTypeSelect"></select>
                    <input type="text" id="editEdgeLabelInput" placeholder="Label (optional)">
                    <button id="saveEdgeBtn">Save</button>
                    <button id="deleteEdgeBtn" style="background-color: #e74c3c;">Delete</button>
                    <button id="closeEdgeEditBtn">Close</button>
                </div>
            </div>

            <!-- Layout Controls -->
            <div class="section">
                <h3>Layout</h3>
                <button id="relayoutBtn">Re-run Layout</button>
                <label>
                    Node Spacing:
                    <input type="range" id="nodeRepulsionSlider" min="100000" max="600000" value="400000" step="50000">
                </label>
                <label>
                    Edge Length:
                    <input type="range" id="edgeLengthSlider" min="50" max="300" value="150" step="10">
                </label>
                <label>
                    <input type="checkbox" id="edgeLabelsToggle" checked>
                    Show Edge Labels
                </label>
            </div>

            <!-- Export -->
            <div class="section">
                <h3>Export</h3>
                <label>
                    <input type="checkbox" id="transparentBgCheckbox">
                    Transparent Background
                </label>
                <button id="exportPngBtn">Export PNG</button>
                <button id="exportJpgBtn">Export JPEG</button>
            </div>

            <!-- Image Upload -->
            <div class="section">
                <h3>Images</h3>
                <input type="file" id="imageUploadInput" multiple accept="image/*" title="Upload images (filename stem must match person ID)">
                <p class="hint">Drag image files onto nodes to assign images</p>
            </div>

            <!-- Node Info Panel -->
            <div id="nodeInfoPanel" class="section" style="display: none;">
                <h3 id="nodeInfoName"></h3>
                <img id="nodeInfoImage" style="max-width: 150px; margin: 10px 0;">
                <p id="nodeInfoBio"></p>
                <p id="nodeInfoRelationships"></p>
            </div>
        </div>

        <!-- Canvas -->
        <div id="cy" class="canvas"></div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/dataLoader.js"></script>
    <script src="js/chartRenderer.js"></script>
    <script src="js/exporter.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/imageUpload.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
